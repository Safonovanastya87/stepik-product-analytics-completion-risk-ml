        "graphics",
        "grDevices",
        "gplots",
        "stats"
      ],
      "Suggests": [
        "testthat",
        "knitr",
        "rmarkdown"
      ],
      "URL": "https://ipa-tys.github.io/ROCR/",
      "BugReports": "https://github.com/ipa-tys/ROCR/issues",
